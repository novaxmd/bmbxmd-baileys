name: Auto Unzip Multi-Folder Project

on:
  push:
    paths:
      - 'project.zip'

jobs:
  unzip_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Unzip
        run: sudo apt-get install -y unzip

      - name: Clean Old Files and Extract New Project
        run: |
          # 1. Create a temporary folder and move project.zip there safely
          mkdir temp_extracted
          cp project.zip temp_extracted/
          
          # 2. Delete all old files and folders in the root directory
          # We use find to avoid deleting the .git folder or temp_extracted
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'temp_extracted' -exec rm -rf {} +
          
          # 3. Move project.zip back to root from temp, then extract
          mv temp_extracted/project.zip ./
          unzip -o project.zip -d temp_extracted/
          rm -f temp_extracted/project.zip # remove the copy inside temp
          
          # 4. Find the first folder inside temp_extracted (whatever its name)
          INTERNAL_FOLDER=$(find temp_extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
          
          # 5. If a folder was found, move everything inside it to the root
          if [ -n "$INTERNAL_FOLDER" ]; then
            echo "Moving files from: $INTERNAL_FOLDER"
            mv "$INTERNAL_FOLDER"/* ./ 2>/dev/null || true
            mv "$INTERNAL_FOLDER"/.* ./ 2>/dev/null || true
          else
            # If no inner folder, move them directly
            mv temp_extracted/* ./ 2>/dev/null || true
            mv temp_extracted/.* ./ 2>/dev/null || true
          fi
          
          # 6. Clean up temporary extraction folder and the zip file
          rm -rf temp_extracted
          rm -f project.zip

      - name: Commit and Push folders to Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Git add -A itachukua mafaili yaliyofutwa (deletions) na mapya pia
          git add -A
          git commit -m "Clean old files and extract new sub-folders automatically" || exit 0
          git push
